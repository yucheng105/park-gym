name: Collect Gym Count

on:
  schedule:
    # Runs every 30 minutes in UTC, offset away from GitHub's busy :00/:30 marks.
    - cron: "7,37 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    concurrency:
      group: collect-gym-count
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python src/data-collection/main.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gym_count.csv
          git commit -m "Update gym count data" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF_NAME}
